<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Phone Gun Fight — AR 槍戰試作版</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 開始畫面 -->
<div id="startScreen" class="screen">
  <h1>🔫 Phone Gun Fight</h1>
  <p class="subtitle">AR 槍戰 — 單機試作版</p>
  <ul class="rules">
    <li>十字標對準人開火</li>
    <li>軀幹 -25 HP／爆頭 -50 HP</li>
    <li>每槍冷卻 1 秒</li>
    <li>擊倒後 5 秒重生</li>
  </ul>
  <button id="startBtn">開始測試</button>
  <p id="loadStatus" class="status"></p>
  <p class="status">首次開啟需下載 AI 模型（之後會快取、秒開）</p>
</div>

<!-- 遊戲畫面 -->
<div id="gameScreen" class="screen hidden">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>

  <!-- HUD -->
  <div id="hud">
    <!-- 上方：自己的血條 -->
    <div id="myHpWrap">
      <div id="myHpLabel">HP <span id="myHpText">100</span></div>
      <div id="myHpBar"><div id="myHpFill"></div></div>
    </div>

    <!-- 中央十字標 -->
    <div id="crosshair">
      <div class="ch-line ch-top"></div>
      <div class="ch-line ch-bottom"></div>
      <div class="ch-line ch-left"></div>
      <div class="ch-line ch-right"></div>
      <div id="hitMarker"></div>
    </div>

    <!-- 命中提示文字 -->
    <div id="hitText"></div>

    <!-- 槍口火光 -->
    <div id="muzzleFlash"></div>

    <!-- 下方：開火鍵 -->
    <div id="fireWrap">
      <button id="fireBtn"><span id="fireRing"></span><span class="fire-icon">🔥</span></button>
    </div>

    <!-- 左上：FPS -->
    <div id="fpsBox">FPS: <span id="fpsText">--</span></div>
  </div>

  <!-- 被擊中紅閃（試作版保留元素，之後連線版使用） -->
  <div id="damageFlash"></div>
</div>

<!-- TensorFlow.js + MoveNet MultiPose（試作版視覺引擎，之後可換 YOLOv8-pose ONNX） -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.22.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu@4.22.0/dist/tf-backend-webgpu.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script src="js/detector.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
<script>
  // Service Worker：快取遊戲檔案與 AI 模型，第二次開啟大幅加速
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
