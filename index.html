<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Phone Gun Fight — AR 槍戰</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css?v=8">
</head>
<body>

<!-- ── 主選單 ── -->
<div id="startScreen" class="screen menu-bg">
  <h1>🔫 Phone Gun Fight</h1>
  <p class="subtitle">手機 AR 槍戰</p>

  <input id="nameInput" type="text" maxlength="8" placeholder="你的名字" autocomplete="off">

  <div class="menu-btns">
    <button id="soloBtn" class="menu-btn">🎯 單機練習</button>
    <button id="hostBtn" class="menu-btn primary">🏠 建立房間</button>
    <div class="join-row">
      <input id="roomInput" type="tel" maxlength="4" placeholder="房號" autocomplete="off">
      <button id="joinBtn" class="menu-btn">🚪 加入</button>
    </div>
  </div>

  <ul class="rules">
    <li>按住開火鍵全自動連發（每發 -5）</li>
    <li>十字標對準人的身體即命中，倒下 5 秒重生</li>
    <li>多人模式請每人穿不同的鮮豔顏色</li>
  </ul>
  <p id="loadStatus" class="status"></p>
  <p class="status">首次開啟需下載 AI 模型（之後會快取、秒開）</p>
</div>

<!-- ── 大廳 ── -->
<div id="lobbyScreen" class="screen menu-bg hidden">
  <h2 id="lobbyTitle">房間 <span id="roomCodeText">----</span></h2>
  <p class="subtitle" id="lobbyHint">把房號唸給朋友輸入加入</p>

  <div id="playerList"></div>

  <div id="colorSampleBox">
    <p class="sample-hint">📷 將鏡頭對準<b>你自己的衣服</b>（放進圓圈），按取樣登錄你的顏色</p>
    <div id="lobbyCamWrap">
      <video id="lobbyCam" autoplay muted playsinline></video>
      <div id="sampleRing"></div>
    </div>
    <button id="sampleBtn">取樣我的顏色</button>
    <p id="sampleStatus" class="status"></p>
  </div>

  <button id="startGameBtn" class="menu-btn primary hidden">🔥 開始遊戲</button>
  <p id="lobbyStatus" class="status"></p>
</div>

<!-- ── 戰鬥 ── -->
<div id="gameScreen" class="screen hidden">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>

  <div id="hud">
    <div id="myHpWrap">
      <div id="myHpLabel">HP <span id="myHpText">100</span></div>
      <div id="myHpBar"><div id="myHpFill"></div></div>
    </div>

    <div id="crosshair">
      <div class="ch-line ch-top"></div>
      <div class="ch-line ch-bottom"></div>
      <div class="ch-line ch-left"></div>
      <div class="ch-line ch-right"></div>
      <div id="hitMarker"></div>
    </div>

    <div id="hitText"></div>
    <div id="killFeed"></div>

    <!-- 槍的瞄準貼圖（第一人稱手槍，槍口朝十字標） -->
    <div id="gunOverlay" aria-hidden="true">
      <svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMax meet">
        <defs>
          <linearGradient id="gmetal" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#0d1013"/>
            <stop offset="0.45" stop-color="#3a4048"/>
            <stop offset="0.55" stop-color="#4c535c"/>
            <stop offset="1" stop-color="#12161a"/>
          </linearGradient>
          <linearGradient id="ggrip" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#2a2018"/>
            <stop offset="1" stop-color="#0d0a07"/>
          </linearGradient>
        </defs>
        <!-- 握把 -->
        <path d="M232 300 L210 175 L272 190 L318 300 Z" fill="url(#ggrip)" stroke="#000" stroke-width="2"/>
        <!-- 扳機護弓 -->
        <path d="M196 180 q-26 8 -22 42 q18 -18 34 -14 Z" fill="#15191d" stroke="#000" stroke-width="2"/>
        <!-- 滑套/槍管（透視梯形，槍口朝上=朝十字標） -->
        <path d="M176 180 L188 78 L212 78 L224 180 Z" fill="url(#gmetal)" stroke="#000" stroke-width="2"/>
        <!-- 槍管開口 -->
        <ellipse cx="200" cy="80" rx="14" ry="6" fill="#05070a" stroke="#555" stroke-width="1.5"/>
        <!-- 準星（前照門） -->
        <rect x="196" y="66" width="8" height="14" rx="1.5" fill="#1a1d22" stroke="#000" stroke-width="1"/>
        <rect x="198.5" y="68" width="3" height="10" fill="#e63946"/>
        <!-- 滑套高光 -->
        <path d="M190 172 L198 86 L202 86 L196 172 Z" fill="rgba(255,255,255,.12)"/>
      </svg>
    </div>

    <div id="muzzleFlash"></div>

    <div id="fireWrap">
      <button id="fireBtn"><span id="fireRing"></span><span class="fire-icon">🔥</span></button>
    </div>

    <div id="fpsBox">FPS: <span id="fpsText">--</span></div>
    <div id="killsBox">💀 <span id="killsText">0</span></div>
  </div>

  <!-- 自己被擊倒：重生倒數遮罩 -->
  <div id="respawnOverlay" class="hidden">
    <div id="respawnMsg">你被擊倒了</div>
    <div id="respawnCount">5</div>
  </div>

  <div id="damageFlash"></div>
</div>

<!-- 函式庫 -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.webgpu.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>

<script src="js/detector-seg.js?v=8"></script>
<script src="js/game.js?v=8"></script>
<script src="js/colorid.js?v=8"></script>
<script src="js/net.js?v=8"></script>
<script src="js/main.js?v=8"></script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
